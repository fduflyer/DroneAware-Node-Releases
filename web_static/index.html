<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A1228">
  <title>DroneAware Local Viewer</title>

  <!-- Bundled Leaflet (no CDN at runtime per brand guide) -->
  <link rel="stylesheet" href="/static/leaflet.css">

  <!-- Brand mark favicon (paper airplane, green #10b981) — inlined as data URI
       so the browser tab icon works without an additional asset request. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='transparent'/%3E%3Cpath d='M22 2L11 13' stroke='%2310b981' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 2L15 22L11 13L2 9L22 2Z' stroke='%2310b981' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">

  <style>
    /* =========================================================================
       Color tokens — dark mode default, [data-theme="day"] override.
       Brand-mark green (#10b981) is reserved for the logo only; cyan
       (#00E5FF) is the accent for links / focus / selected state / .io.
       ========================================================================= */
    :root {
      --bg-primary:    #0A1228;
      --bg-surface:    #0F1B3A;
      --bg-elevated:   #142450;
      --border:        #1E3A6E;
      --border-hover:  #2E5AA8;
      --text-primary:  #E4ECFA;
      --text-dim:      #94A3B8;
      --text-muted:    #64748B;
      --accent:        #00E5FF;
      --brand:         #10b981;
      --fresh-live:    #00E5FF;
      --fresh-recent:  #10B981;
      --fresh-aging:   #FB923C;
      --fresh-stale:   #F87171;
      --fresh-gray:    rgb(107,114,128);
      --status-ok:     #10B981;
      --status-warn:   #FB923C;
      --status-error:  #F87171;
      --status-idle:   #64748B;
    }
    [data-theme="day"] {
      --bg-primary:    #F7FAFD;
      --bg-surface:    #FFFFFF;
      --bg-elevated:   #F1F5F9;
      --border:        #CBD5E1;
      --border-hover:  #94A3B8;
      --text-primary:  #0F172A;
      --text-dim:      #475569;
      --text-muted:    #94A3B8;
      --accent:        #0BA5D9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
                   Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    .mono {
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono",
                   Consolas, "Courier New", monospace;
    }

    /* ========== Header (44px fixed top) ========== */
    .header {
      height: 44px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      position: relative;
      z-index: 10;
    }
    .brand-wordmark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      text-decoration: none;
      flex-shrink: 0;
    }
    .brand-wordmark .brand-tld { color: var(--accent); }
    .brand-wordmark svg { width: 22px; height: 22px; flex-shrink: 0; }

    .header-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .header-center .sep { color: var(--text-muted); }
    .header-center .label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 10px;
      color: var(--text-muted);
    }
    .header-center .count { color: var(--text-primary); font-weight: 700; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--status-ok);
      box-shadow: 0 0 6px var(--status-ok);
    }
    .status-pill.offline .dot { background: var(--status-idle); box-shadow: none; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .icon-btn:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border-color: var(--border-hover);
    }
    .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ========== Main layout (sidebar + map) ========== */
    .main {
      display: flex;
      height: calc(100% - 44px - 28px);  /* minus header, minus status bar */
    }
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-filters {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .chip:hover { border-color: var(--border-hover); }
    .chip.on { border-color: var(--accent); color: var(--text-primary); }
    .chip.off { color: var(--text-muted); opacity: 0.6; }
    .chip-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-surface);
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .card:hover {
      background: var(--bg-elevated);
      border-color: var(--border-hover);
    }
    .card.selected { border-color: var(--accent); }
    .card-thumb {
      flex-shrink: 0;
      width: 36px; height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fresh-recent);  /* default — overridden by JS */
    }
    .card-thumb svg { width: 28px; height: 28px; }
    .card-body { flex: 1; min-width: 0; }
    .card-id {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .card-tags {
      margin-top: 6px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 10px;
    }
    .freshness-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .freshness-dot::before {
      content: "";
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }
    .radio-tag {
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--bg-elevated);
      color: var(--text-dim);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px;
      color: var(--text-muted);
    }
    .empty svg {
      width: 96px;
      height: 96px;
      opacity: 0.7;
    }
    .empty .title { font-size: 14px; font-weight: 700; color: var(--text-dim); }
    .empty .sub { font-size: 12px; }

    /* ========== Map ========== */
    .map {
      flex: 1;
      height: 100%;
      background: var(--bg-primary);
    }
    .leaflet-container {
      background: var(--bg-primary);
      font-family: inherit;
    }
    .drone-marker {
      transform-origin: center;
    }
    .drone-marker svg {
      width: 40px; height: 40px;
      transition: color 0.2s;
    }
    .drone-marker.live svg {
      filter: drop-shadow(0 0 8px var(--fresh-live));
    }
    .operator-marker {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%      { transform: scale(1.4); opacity: 0.6; }
    }

    /* ========== Status bar (28px bottom) ========== */
    .statusbar {
      height: 28px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .statusbar .sep { color: var(--text-muted); }
    .statusbar .label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 9px;
      color: var(--text-muted);
    }
    .statusbar .val { color: var(--text-primary); font-weight: 700; }

    /* ========== Detail modal ========== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: min(520px, 92vw);
      max-height: 86vh;
      overflow-y: auto;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal-header h2 {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .modal-body {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
    }
    .field { display: flex; flex-direction: column; gap: 2px; }
    .field-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .field-value {
      font-size: 13px;
      color: var(--text-primary);
    }

    /* ========== Toast notifications ========== */
    .toast-container {
      position: fixed;
      bottom: 40px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1100;
    }
    .toast {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 12px;
      font-size: 14px;
      color: var(--text-primary);
      border-radius: 4px;
      max-width: 320px;
      cursor: pointer;
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ========== Mobile responsive (< 768px) ========== */
    @media (max-width: 767px) {
      .main { flex-direction: column; }
      .sidebar {
        position: fixed;
        bottom: 28px;
        left: 0; right: 0;
        width: 100%;
        max-height: 60vh;
        transform: translateY(calc(100% - 48px));
        transition: transform 0.25s ease-out;
        border-right: none;
        border-top: 1px solid var(--border);
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        z-index: 50;
      }
      .sidebar.open { transform: translateY(0); }
      .sidebar::before {
        content: "";
        position: absolute;
        top: 6px; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 4px;
        border-radius: 2px;
        background: var(--text-muted);
        opacity: 0.5;
      }
      .sidebar-filters { padding-top: 24px; }
      .map { width: 100%; height: 100%; }
      .modal-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <a href="/" class="brand-wordmark" title="DroneAware Local Viewer">
      <!-- Brand mark SVG: paper airplane, green #10b981 (fixed) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M22 2L11 13" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span><span class="brand-name">DroneAware</span><span class="brand-tld">.io</span></span>
    </a>
    <div class="header-center">
      <span class="label">LOCAL VIEWER</span>
      <span class="sep">·</span>
      <span><span class="count" id="hdr-count">0</span> drones</span>
      <span class="sep">·</span>
      <span class="status-pill" id="hdr-status">
        <span class="dot"></span><span id="hdr-status-label">LIVE</span>
      </span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle theme">◐</button>
      <button class="icon-btn" id="btn-sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>
    </div>
  </div>

  <!-- Main: sidebar + map -->
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-filters">
        <span class="chip on" data-filter="freshness" data-value="live">
          <span class="chip-dot" style="color: var(--fresh-live);"></span>Live
        </span>
        <span class="chip on" data-filter="freshness" data-value="recent">
          <span class="chip-dot" style="color: var(--fresh-recent);"></span>Recent
        </span>
        <span class="chip off" data-filter="freshness" data-value="stale">
          <span class="chip-dot" style="color: var(--fresh-stale);"></span>Stale
        </span>
        <span class="chip on" data-filter="radio" data-value="wifi">WiFi</span>
        <span class="chip on" data-filter="radio" data-value="ble">BLE</span>
        <span class="chip off" data-filter="kind" data-value="test">Test</span>
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <!-- Cards appear here. Empty state initially. -->
        <div class="empty" id="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M22 2L11 13" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          <div class="title">No drones detected</div>
          <div class="sub">Your node is scanning.</div>
        </div>
      </div>
    </div>
    <div class="map" id="map"></div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span><span class="label">Buffer</span> <span class="val mono" id="stat-buffer">0%</span></span>
    <span class="sep">·</span>
    <span><span class="label">CPU</span> <span class="val mono" id="stat-cpu">—</span></span>
    <span class="sep">·</span>
    <span><span class="label">Load</span> <span class="val mono" id="stat-load">—</span></span>
    <span class="sep">·</span>
    <span><span class="label">Events</span> <span class="val mono" id="stat-events">0</span></span>
    <span class="sep">·</span>
    <span><span class="label">Uptime</span> <span class="val mono" id="stat-uptime">0s</span></span>
    <span style="margin-left: auto;"><span class="label">v</span><span class="val mono" id="stat-version">—</span></span>
  </div>

  <!-- Detail modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-id">—</h2>
        <button class="icon-btn" id="btn-modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Field rows populated by JS -->
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Bundled Leaflet -->
  <script src="/static/leaflet.js"></script>

  <script>
    "use strict";
    /* =========================================================================
       DroneAware Local Viewer client
       SSE-driven, vanilla JS, no framework. Backend serves /api/detections
       (snapshot), /api/status (stats), /events (SSE stream).
       ========================================================================= */

    // FA paper-plane SVG (drone marker) — color via currentColor.
    const DRONE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor"><path d="M498.1 5.6c10.1 7 15.4 19.1 13.5 31.2l-64 416c-1.5 9.7-7.4 18.2-16 23s-18.9 5.4-28 1.6L284 427.7l-68.5 74.1c-8.9 9.7-22.9 12.9-35.2 8.1S160 493.2 160 480V396.4c0-4 1.5-7.8 4.2-10.7L331.8 202.8c5.8-6.3 5.6-16-.4-22s-15.7-6.4-22-.7L106 360.8 17.7 316.6C7.1 311.3 .3 300.7 0 288.9s5.9-22.8 16.1-28.7l448-256c10.7-6.1 23.9-5.5 34 1.4z"/></svg>`;

    const FRESHNESS = [
      { tier: "live",   maxAge:   60, color: "var(--fresh-live)",   label: "LIVE"   },
      { tier: "recent", maxAge:  300, color: "var(--fresh-recent)", label: "RECENT" },
      { tier: "aging",  maxAge:  900, color: "var(--fresh-aging)",  label: "AGING"  },
      { tier: "stale",  maxAge: 1800, color: "var(--fresh-stale)",  label: "STALE"  },
    ];
    const STALE_PRUNE_SEC = 1800;

    /* ----- State ----- */
    const state = {
      macs: new Map(),               // mac -> { event, first_seen, last_seen, marker, card }
      filters: {
        freshness: new Set(["live", "recent"]),
        radio:     new Set(["wifi", "ble"]),
        test:      false,
      },
      selectedMac: null,
      sse: null,
      map: null,
    };

    /* ----- Helpers ----- */
    function freshnessFor(ageSec) {
      for (const f of FRESHNESS) if (ageSec < f.maxAge) return f;
      return { tier: "gray", color: "var(--fresh-gray)", label: "GRAY" };
    }
    function relTime(secAgo) {
      if (secAgo < 60)  return Math.floor(secAgo) + "s ago";
      if (secAgo < 3600) return Math.floor(secAgo / 60) + "m ago";
      return Math.floor(secAgo / 3600) + "h " + Math.floor((secAgo % 3600) / 60) + "m ago";
    }
    function fmtUptime(sec) {
      const d = Math.floor(sec / 86400);
      const h = Math.floor((sec % 86400) / 3600);
      const m = Math.floor((sec % 3600) / 60);
      if (d) return `${d}d ${h}h`;
      if (h) return `${h}h ${m}m`;
      return `${m}m`;
    }
    function isTestEvent(evt) {
      // cmd_test broadcasts use a recognizable ID prefix — adjust as needed
      const id = (evt.id || "").toString().toUpperCase();
      return id.startsWith("TEST-") || id.startsWith("DA-TEST") || (evt.mac || "").startsWith("00:00:00");
    }

    /* ----- Map init ----- */
    function initMap() {
      const m = L.map("map", {
        center: [40.0, -98.0],     // continental US default
        zoom: 5,
        zoomControl: true,
        attributionControl: true,
      });
      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: "abcd",
        maxZoom: 19,
      }).addTo(m);
      state.map = m;
    }

    /* ----- Markers ----- */
    function makeDroneIcon(color, isLive, heading) {
      const tilt = (heading || 0) - 45;  // FA paper-plane "forward" is upper-right
      const cls = "drone-marker" + (isLive ? " live" : "");
      return L.divIcon({
        className: cls,
        html: `<div style="color: ${color}; transform: rotate(${tilt}deg);">${DRONE_SVG}</div>`,
        iconSize: [40, 40],
        iconAnchor: [20, 20],
      });
    }

    function updateMarker(mac) {
      const entry = state.macs.get(mac);
      if (!entry) return;
      const evt = entry.event;
      const lat = evt.lat || evt.latitude;
      const lon = evt.lon || evt.longitude;
      if (typeof lat !== "number" || typeof lon !== "number") return;

      const age = (Date.now() / 1000) - entry.last_seen;
      const f = freshnessFor(age);
      const icon = makeDroneIcon(f.color, f.tier === "live", evt.heading || evt.hdg || 0);

      if (!entry.marker) {
        entry.marker = L.marker([lat, lon], { icon }).addTo(state.map);
        entry.marker.on("click", () => openModal(mac));
      } else {
        entry.marker.setLatLng([lat, lon]);
        entry.marker.setIcon(icon);
      }
    }

    function removeMarker(mac) {
      const entry = state.macs.get(mac);
      if (entry && entry.marker) {
        state.map.removeLayer(entry.marker);
        entry.marker = null;
      }
    }

    /* ----- Sidebar cards ----- */
    function renderCard(mac) {
      const entry = state.macs.get(mac);
      if (!entry) return;
      const evt = entry.event;
      const age = (Date.now() / 1000) - entry.last_seen;
      const f = freshnessFor(age);
      // Normalize radio for display: wifi_beacon / wifi_nan / wifi all
      // render as "WIFI"; ble renders as "BLE". Keeps the card visually
      // consistent regardless of which LocalPublisher source path the
      // event came through.
      const radioRaw = (evt.radio || "").toLowerCase();
      const radio = radioRaw.startsWith("wifi") ? "WIFI"
                  : radioRaw === "ble"          ? "BLE"
                  :                                (evt.radio || "?").toUpperCase();

      let card = entry.card;
      if (!card) {
        card = document.createElement("div");
        card.className = "card";
        card.dataset.mac = mac;
        card.addEventListener("click", () => openModal(mac));
        entry.card = card;
      }
      const id = evt.id || evt.uas_id || mac;
      card.innerHTML = `
        <div class="card-thumb" style="color: ${f.color};">${DRONE_SVG}</div>
        <div class="card-body">
          <div class="card-id mono">${escapeHtml(id)}</div>
          <div class="card-meta">${escapeHtml(evt.type || "?")} · ${relTime(age)}</div>
          <div class="card-tags">
            <span class="freshness-dot" style="color: ${f.color};">${f.label}</span>
            <span class="radio-tag">${escapeHtml(radio)}</span>
          </div>
        </div>
      `;
      return card;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function applyFilters() {
      const f = state.filters;
      const list = document.getElementById("sidebar-list");
      const empty = document.getElementById("empty-state");

      // Remove empty state if any visible entries
      let visibleCount = 0;
      for (const [mac, entry] of state.macs) {
        const evt = entry.event;
        const age = (Date.now() / 1000) - entry.last_seen;
        const tier = freshnessFor(age).tier;
        const radio = (evt.radio || "").toLowerCase();
        // Normalize radio variants: LocalPublisher emits "wifi_beacon"
        // (Wi-Fi Beacon frames — what cmd_test uses) and "wifi_nan"
        // (Wi-Fi NAN action frames — many commercial drones) in addition
        // to "wifi". Map all wifi_* variants to the "wifi" filter chip;
        // "ble" stays as "ble"; unknown radios pass through to be filtered
        // by exact match (won't pass any chip, so they're hidden unless
        // someone explicitly adds a chip for them).
        const radioKind = radio.startsWith("wifi") ? "wifi"
                        : radio === "ble"          ? "ble"
                        :                            radio;
        const isTest = isTestEvent(evt);

        const passFresh = f.freshness.has(tier === "aging" ? "recent" : tier);
        const passRadio = f.radio.has(radioKind) || (radioKind === "" && f.radio.size);
        const passTest  = f.test || !isTest;
        const visible   = passFresh && passRadio && passTest;

        if (visible) {
          if (entry.card && !entry.card.parentNode) list.appendChild(entry.card);
          if (entry.marker) entry.marker.setOpacity(1);
          visibleCount++;
        } else {
          if (entry.card && entry.card.parentNode) entry.card.remove();
          if (entry.marker) entry.marker.setOpacity(0);
        }
      }
      empty.style.display = visibleCount === 0 ? "flex" : "none";
      document.getElementById("hdr-count").textContent = visibleCount;
    }

    /* ----- Event handling ----- */
    function handleEvent(evt) {
      const mac = evt.mac || evt.source_mac;
      if (!mac) return;
      const now = Date.now() / 1000;
      let entry = state.macs.get(mac);
      if (!entry) {
        entry = { event: evt, first_seen: now, last_seen: now, marker: null, card: null };
        state.macs.set(mac, entry);
      } else {
        entry.event = { ...entry.event, ...evt };  // merge so later events keep lat/lon if absent
        entry.last_seen = now;
      }
      updateMarker(mac);
      renderCard(mac);
    }

    function handleSnapshot(snap) {
      for (const m of (snap.macs || [])) {
        const evt = m.latest;
        if (!evt) continue;
        const entry = {
          event: evt,
          first_seen: m.first_seen,
          last_seen: m.last_seen,
          marker: null, card: null,
        };
        state.macs.set(m.mac, entry);
        updateMarker(m.mac);
        renderCard(m.mac);
      }
    }

    /* ----- Freshness refresh + prune ----- */
    function refreshFreshness() {
      const now = Date.now() / 1000;
      const toPrune = [];
      for (const [mac, entry] of state.macs) {
        const age = now - entry.last_seen;
        if (age > STALE_PRUNE_SEC) {
          toPrune.push(mac);
          continue;
        }
        updateMarker(mac);
        renderCard(mac);
      }
      for (const mac of toPrune) {
        removeMarker(mac);
        const entry = state.macs.get(mac);
        if (entry && entry.card && entry.card.parentNode) entry.card.remove();
        state.macs.delete(mac);
      }
      applyFilters();
    }

    /* ----- Status bar ----- */
    async function refreshStatus() {
      try {
        const r = await fetch("/api/status");
        if (!r.ok) return;
        const s = await r.json();
        document.getElementById("stat-buffer").textContent =
          `${s.buffer_pct}% (${(s.buffer_bytes / 1e6).toFixed(1)} MB)`;
        document.getElementById("stat-cpu").textContent =
          s.cpu_temp_c != null ? `${s.cpu_temp_c}°C` : "—";
        document.getElementById("stat-load").textContent =
          s.load_1m != null ? s.load_1m.toFixed(2) : "—";
        document.getElementById("stat-events").textContent = s.event_count;
        document.getElementById("stat-uptime").textContent = fmtUptime(s.uptime_s);
        document.getElementById("stat-version").textContent = s.version;
      } catch (e) {}
    }

    /* ----- SSE ----- */
    function connectSSE() {
      if (state.sse) try { state.sse.close(); } catch (e) {}
      const es = new EventSource("/events");
      es.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); } catch {}
      };
      es.onerror = () => {
        setHeaderStatus(false);
        // EventSource auto-reconnects; just visually flip to OFFLINE
      };
      es.onopen = () => setHeaderStatus(true);
      state.sse = es;
    }
    function setHeaderStatus(live) {
      const pill = document.getElementById("hdr-status");
      const label = document.getElementById("hdr-status-label");
      if (live) {
        pill.classList.remove("offline");
        label.textContent = "LIVE";
      } else {
        pill.classList.add("offline");
        label.textContent = "OFFLINE";
      }
    }

    /* ----- Modal ----- */
    function openModal(mac) {
      const entry = state.macs.get(mac);
      if (!entry) return;
      const evt = entry.event;
      state.selectedMac = mac;
      document.getElementById("modal-id").textContent = evt.id || evt.uas_id || mac;
      const body = document.getElementById("modal-body");
      const age = (Date.now() / 1000) - entry.last_seen;
      const fields = [
        ["MAC",        mac],
        ["Radio",      (evt.radio || "?").toUpperCase()],
        ["Type",       evt.type || "?"],
        ["Latitude",   evt.lat != null ? evt.lat.toFixed(6) : "—"],
        ["Longitude",  evt.lon != null ? evt.lon.toFixed(6) : "—"],
        ["Altitude",   evt.alt != null ? `${evt.alt} m` : "—"],
        ["Speed",      evt.speed != null ? `${evt.speed} m/s` : "—"],
        ["Heading",    evt.hdg != null ? `${evt.hdg}°` : (evt.heading != null ? `${evt.heading}°` : "—")],
        ["RSSI",       evt.rssi != null ? `${evt.rssi} dBm` : "—"],
        ["Channel",    evt.channel != null ? evt.channel : "—"],
        ["First seen", relTime((Date.now()/1000) - entry.first_seen)],
        ["Last seen",  relTime(age)],
      ];
      body.innerHTML = fields.map(([label, val]) =>
        `<div class="field"><div class="field-label">${escapeHtml(label)}</div>
         <div class="field-value mono">${escapeHtml(val)}</div></div>`).join("");
      document.getElementById("modal-overlay").classList.add("open");
    }
    function closeModal() {
      state.selectedMac = null;
      document.getElementById("modal-overlay").classList.remove("open");
    }

    /* ----- Theme ----- */
    function loadTheme() {
      const t = localStorage.getItem("da_theme") || "dark";
      document.documentElement.dataset.theme = t;
    }
    function toggleTheme() {
      const cur = document.documentElement.dataset.theme || "dark";
      const next = cur === "dark" ? "day" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem("da_theme", next);
    }

    /* ----- Filter chip wiring ----- */
    function initFilters() {
      document.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const filter = chip.dataset.filter;
          const value = chip.dataset.value;
          const on = chip.classList.toggle("on");
          chip.classList.toggle("off", !on);
          if (filter === "kind" && value === "test") {
            state.filters.test = on;
          } else if (filter === "freshness") {
            if (on) state.filters.freshness.add(value);
            else    state.filters.freshness.delete(value);
          } else if (filter === "radio") {
            if (on) state.filters.radio.add(value);
            else    state.filters.radio.delete(value);
          }
          applyFilters();
        });
      });
    }

    /* ----- Init ----- */
    document.addEventListener("DOMContentLoaded", async () => {
      loadTheme();
      initMap();
      initFilters();
      document.getElementById("btn-theme").addEventListener("click", toggleTheme);
      document.getElementById("btn-sidebar-toggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("open");
      });
      document.getElementById("btn-modal-close").addEventListener("click", closeModal);
      document.getElementById("modal-overlay").addEventListener("click", (e) => {
        if (e.target.id === "modal-overlay") closeModal();
      });

      // Initial snapshot
      try {
        const r = await fetch("/api/detections");
        if (r.ok) handleSnapshot(await r.json());
      } catch {}

      connectSSE();
      refreshStatus();
      applyFilters();

      // Periodic loops
      setInterval(refreshStatus, 2000);
      setInterval(refreshFreshness, 1000);

      // Pause SSE handling when tab is hidden (per brand guide)
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && (!state.sse || state.sse.readyState !== EventSource.OPEN)) {
          connectSSE();
        }
      });
    });
  </script>
</body>
</html>
