name: Reusable Build and Release
on:
  workflow_call:
    inputs:
      version:
        default: dev
        type: string
      publish:
        default: false
        type: boolean
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pguyot/arm-runner-action@29ff97a269fc6ef3e98f17583af01253896c5601
        with:
          base_image: "raspios_lite_arm64:latest"
          cpu: cortex-a7
          copy_artifact_path: dist/
          commands: |
            bash ./build.sh
      - uses: actions/upload-artifact@v7
        with:
          path: dist/
          overwrite: true
  release:
    needs: build
    if: inputs.publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        id: download
      - name: Stamp install.sh with release version and repo
        # Each release's install.sh points at its own binaries in its own repo,
        # so users (and PR testers) can run install.sh from any release directly.
        run: |
          [[ "$VERSION" =~ ^v ]] || VERSION="v$VERSION"
          sed -i "s|^INSTALLER_VERSION=.*|INSTALLER_VERSION=\"${VERSION}\"|" install.sh
          sed -i "s|^BINARY_VERSION=.*|BINARY_VERSION=\"${VERSION}\"|"       install.sh
          sed -i "s|^GITHUB_REPO=.*|GITHUB_REPO=\"${REPO}\"|"                install.sh
          echo "Stamped install.sh:"
          grep -E '^(INSTALLER_VERSION|BINARY_VERSION|GITHUB_REPO)=' install.sh
        env:
          VERSION: ${{ inputs.version }}
          REPO:    ${{ github.repository }}
      - uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.download.outputs.download-path }}/ble_feeder
            ${{ steps.download.outputs.download-path }}/wifi_feeder
            install.sh
            droneaware
            droneaware-bt-select
            droneaware-bt-select.service
            droneaware-ble.service
            droneaware-wifi.service
      - name: Create Release
        run: |
          [[ "$VERSION" =~ ^v ]] || VERSION="v$VERSION"
          gh release create "${VERSION}" "${DL_PATH}/ble_feeder" \
            "${DL_PATH}/wifi_feeder" \
            install.sh \
            droneaware \
            droneaware-bt-select \
            droneaware-bt-select.service \
            droneaware-ble.service \
            droneaware-wifi.service \
            --generate-notes
        env:
          VERSION: ${{ inputs.version }}
          DL_PATH: ${{ steps.download.outputs.download-path }}
          GH_TOKEN: ${{ github.token }}
