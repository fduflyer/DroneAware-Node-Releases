name: Reusable Build and Release
on:
  workflow_call:
    inputs:
      version:
        default: dev
        type: string
      publish:
        default: false
        type: boolean
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pguyot/arm-runner-action@29ff97a269fc6ef3e98f17583af01253896c5601
        with:
          # Pin to Debian Bookworm (glibc 2.36) — must match the OS DroneAware
          # nodes run. raspios_lite_arm64:latest moved to Trixie (glibc 2.41) in
          # 2026-04, which produced v1.2.0 binaries that fail on Bookworm with
          # "GLIBC_2.38 not found." Pin keeps binaries forward-compatible:
          # build on the oldest supported OS so binaries run everywhere newer.
          base_image: "raspi_3_bookworm:20231109"
          cpu: cortex-a72
          copy_artifact_path: dist/
          commands: |
            apt-get update
            apt-get install -y python3 python3-pip python3-venv
            export VERSION="${{ inputs.version }}"
            bash ./build.sh
      - uses: actions/upload-artifact@v7
        with:
          path: dist/
          overwrite: true
  release:
    needs: build
    if: inputs.publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        id: download
      - name: Stamp install.sh with release version and repo
        # Each release's install.sh points at its own binaries in its own repo,
        # so users (and PR testers) can run install.sh from any release directly.
        run: |
          [[ "$VERSION" =~ ^v ]] || VERSION="v$VERSION"
          sed -i "s|^INSTALLER_VERSION=.*|INSTALLER_VERSION=\"${VERSION}\"|" install.sh
          sed -i "s|^BINARY_VERSION=.*|BINARY_VERSION=\"${VERSION}\"|"       install.sh
          sed -i "s|^GITHUB_REPO=.*|GITHUB_REPO=\"${REPO}\"|"                install.sh
          echo "Stamped install.sh:"
          grep -E '^(INSTALLER_VERSION|BINARY_VERSION|GITHUB_REPO)=' install.sh
        env:
          VERSION: ${{ inputs.version }}
          REPO:    ${{ github.repository }}
      - uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.download.outputs.download-path }}/ble_feeder
            ${{ steps.download.outputs.download-path }}/wifi_feeder
            ${{ steps.download.outputs.download-path }}/web_ui
            install.sh
            droneaware
            droneaware-bt-select
            droneaware-bt-select.service
            droneaware-ble.service
            droneaware-wifi.service
            droneaware-web.service
      - name: Create Release
        run: |
          [[ "$VERSION" =~ ^v ]] || VERSION="v$VERSION"
          gh release create "${VERSION}" "${DL_PATH}/ble_feeder" \
            "${DL_PATH}/wifi_feeder" \
            "${DL_PATH}/web_ui" \
            install.sh \
            droneaware \
            droneaware-bt-select \
            droneaware-bt-select.service \
            droneaware-ble.service \
            droneaware-wifi.service \
            droneaware-web.service \
            --generate-notes
        env:
          VERSION: ${{ inputs.version }}
          DL_PATH: ${{ steps.download.outputs.download-path }}
          GH_TOKEN: ${{ github.token }}
      - name: Append SHA256 checksums to release notes
        # Lower-barrier verification path than `gh attestation verify` (which
        # needs the GitHub CLI + auth). Users can copy the block below into a
        # file and run `sha256sum -c <file>` to verify integrity.
        run: |
          [[ "$VERSION" =~ ^v ]] || VERSION="v$VERSION"
          existing=$(gh release view "$VERSION" --json body -q .body)
          {
            echo "$existing"
            echo ""
            echo "## SHA256 Checksums"
            echo ""
            echo 'Verify downloaded files with `sha256sum -c` against this list:'
            echo ""
            echo '```'
            for f in ble_feeder wifi_feeder web_ui install.sh droneaware \
                     droneaware-bt-select droneaware-bt-select.service \
                     droneaware-ble.service droneaware-wifi.service \
                     droneaware-web.service; do
              src="${DL_PATH}/${f}"
              [[ -f "$src" ]] || src="${f}"
              sha=$(sha256sum "$src" | awk '{print $1}')
              printf '%s  %s\n' "$sha" "$f"
            done
            echo '```'
          } > /tmp/notes.md
          gh release edit "$VERSION" --notes-file /tmp/notes.md
        env:
          VERSION: ${{ inputs.version }}
          DL_PATH: ${{ steps.download.outputs.download-path }}
          GH_TOKEN: ${{ github.token }}
